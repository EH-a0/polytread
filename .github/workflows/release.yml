name: Release native binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: polytread-windows-x64.exe
            source: target/x86_64-pc-windows-msvc/release/polytread.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: polytread-linux-x64
            source: target/x86_64-unknown-linux-gnu/release/polytread
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: polytread-linux-arm64
            source: target/aarch64-unknown-linux-gnu/release/polytread
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: polytread-macos-x64
            source: target/x86_64-apple-darwin/release/polytread
          - os: macos-15
            target: aarch64-apple-darwin
            asset: polytread-macos-arm64
            source: target/aarch64-apple-darwin/release/polytread
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.97"
          targets: ${{ matrix.target }}
      - name: Build locked release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Prepare asset on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.source }}" "dist/${{ matrix.asset }}"
          shasum -a 256 "dist/${{ matrix.asset }}" > "dist/${{ matrix.asset }}.sha256"
      - name: Prepare asset on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath '${{ matrix.source }}' -Destination 'dist/${{ matrix.asset }}'
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath 'dist/${{ matrix.asset }}').Hash.ToLowerInvariant()
          Set-Content -NoNewline -LiteralPath 'dist/${{ matrix.asset }}.sha256' -Value "$hash  ${{ matrix.asset }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true
